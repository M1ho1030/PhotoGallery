<!-- ベーステンプレートを適用する -->
{% extends 'base.html' %}
<!-- ヘッダー情報のページタイトルを設定する -->
{% block title %}Photo Detail{% endblock %}

    {% block contents %}
    <!-- Bootstrapのグリッドシステム -->
    <br>
    <div class="container">
        <!-- 行を配置 -->
        <div class="row">
            <!-- 列の左右にoffset-3を入れる -->
            <div class="col offset-3">
                <!-- タイトル -->
                <h2>{{object.title}}</h2>
                <!-- コメント -->
                <p>{{object.comment}}</p>
                <br>
                <!-- 投稿日時 -->
                <p>{{object.posted_at}}に投稿</p>
                <!-- 1枚目の写真 -->
                <p> <img src="{{ object.image1.url }}"style="width:100%; height:300px; object-fit:contain;"></p>
            </div>
        </div>
    </div>
    {% endblock %}
